# In-cluster Redis for Outline (cache + pub/sub for websockets/collaboration).
# Ephemeral — Outline treats Redis as a cache, so no persistence is required.
apiVersion: v1
kind: Service
metadata:
  name: stem-wiki-redis
  labels:
    app: stem-wiki
    component: redis
spec:
  selector:
    app: stem-wiki
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stem-wiki-redis
  labels:
    app: stem-wiki
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stem-wiki
      component: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: stem-wiki
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "320Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
